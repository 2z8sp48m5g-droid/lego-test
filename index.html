<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Modèle Lego 3D</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f4f9;
        }

        h1 {
            color: #333;
            margin-top: 20px;
        }

        /* Conteneur du visualiseur */
        .container {
            width: 80%;
            height: 600px;
            margin-top: 30px;
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* Style du composant 3D */
        model-viewer {
            width: 100%;
            height: 100%;
            --poster-color: transparent; /* Supprime le fond lors du chargement */
        }

        .instructions {
            margin-top: 20px;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <h1>Mon Modèle Lego Interactif</h1>

    <div class="container">
        <model-viewer 
            src="test.glb" 
            alt="Modèle 3D de Lego"
            camera-controls
            auto-rotate
            shadow-intensity="1"
            environment-image="neutral"
            exposure="1"
            scale="500 500 500" 
            ar
            touch-action="pan-y">
            
            <button slot="ar-button" style="background-color: white; border-radius: 4px; border: none; position: absolute; top: 16px; right: 16px; padding: 10px;">
                👋 Voir en vrai (AR)
            </button>

        </model-viewer>
    </div>

    <p class="instructions">Utilisez votre souris pour tourner et la molette pour zoomer.</p>

</body>
</html>
